# LiteLLM model routing for cross-model debate
# Copy to litellm-config.yaml and fill in API keys
# Start with: litellm --config config/litellm-config.yaml

model_list:
  # Model names MUST match config/debate-models.json persona assignments.
  # debate.py requests models by these names through LiteLLM.

  - model_name: claude-opus-4-7
    litellm_params:
      model: claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gpt-5.4
    litellm_params:
      model: gpt-4.1              # change to your actual OpenAI model
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gemini-3.1-pro
    litellm_params:
      model: gemini/gemini-2.5-pro  # change to your actual Gemini model
      api_key: os.environ/GEMINI_API_KEY

litellm_settings:
  drop_params: true
  request_timeout: 120

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
