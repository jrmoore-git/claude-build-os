name: Banned Terms Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for project-specific terms
        run: |
          # Same pattern as pre-commit hook. Keep both in sync.
          # Add project-specific terms that must never appear in BuildOS upstream.
          BANNED_PATTERN='sk-ant-|xoxb-|xapp-'

          # Files that legitimately contain the pattern
          EXCLUDE_ARGS=(
            --exclude="./hooks/pre-commit-banned-terms.sh"
            --exclude="hooks/pre-commit-banned-terms.sh"
            --exclude-dir=".github"
            --exclude-dir=".git"
            --exclude-dir="__pycache__"
            --exclude-dir="_archive"
            --exclude-dir="tasks"
            --exclude="*.sample"
            --exclude=".env.example"
          )

          echo "Scanning for project-specific term leaks..."
          echo ""

          MATCHES="$(grep -rnE "$BANNED_PATTERN" "${EXCLUDE_ARGS[@]}" . 2>/dev/null | grep -v 'pre-commit-banned-terms\.sh' || true)"

          if [ -n "$MATCHES" ]; then
            echo "FAILED — project-specific terms found:"
            echo ""
            echo "$MATCHES"
            echo ""
            echo "This repo must stay generic. Remove these references."
            exit 1
          fi

          echo "PASSED — no project-specific terms found."
